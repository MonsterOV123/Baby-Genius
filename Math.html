<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Genius - Math Game</title>
<style>
:root { --sky:#9fd9ff; --sun:#ffd84d; --grass:#8be28b; --berry:#ff6b9a; --blue:#2f7ef7; --ink:#22324d; --card:#ffffff; }
*{box-sizing:border-box}
body{margin:0;font-family:"Trebuchet MS","Comic Sans MS",sans-serif;background:linear-gradient(160deg,var(--sky),#d6f4ff 45%,#fff8d2 100%);color:var(--ink);min-height:100vh;display:flex;flex-direction:column}

header{background:linear-gradient(90deg,var(--sun),#ffef9a);padding:18px 24px;border-bottom:4px solid #f1bf32;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center}
.logo{margin:0;font-size:2rem;color:#ff4f84;text-shadow:2px 2px 0 #fff}
.logo a{color:inherit;text-decoration:none}
nav ul{list-style:none;display:flex;gap:12px;margin:0;padding:0}
nav a{text-decoration:none;font-weight:700;padding:10px 16px;border-radius:999px;background-color:var(--blue);color:#fff}
nav a:hover{background:#1e66d0}

main{flex:1;display:flex;justify-content:center;align-items:center;padding:20px}

.container{background:var(--card);padding:24px;border-radius:20px;border:4px solid #c5efff;box-shadow:0 8px 24px rgba(34,50,77,.1);text-align:center;width:400px;position:relative;overflow:hidden}

select,button{margin:8px 0;padding:10px;border-radius:999px;border:none;font-size:1rem}
button{background:var(--blue);color:#fff;font-weight:700;cursor:pointer}
button:hover{background:#1e66d0}

.print-area{margin-top:15px;padding:15px;border:2px dashed #c5efff;border-radius:12px;background:#fff;min-height:90px}
.emoji-group{font-size:36px;line-height:1.5;margin:6px 0;word-break:break-all}
.equation{font-size:2.4rem;font-weight:700;color:var(--ink);margin:10px 0}
.puzzle-label{font-size:0.95rem;color:#888;margin:6px 0 0}

/* Answer area */
.answer-area{margin-top:14px;display:none;align-items:center;justify-content:center;gap:10px}
.answer-area input{width:90px;font-size:1.5rem;text-align:center;border:3px solid #c5efff;border-radius:12px;padding:8px 6px;font-weight:700;color:var(--ink);outline:none;transition:border-color .2s}
.answer-area input:focus{border-color:var(--blue)}
.check-btn{background:#5ccc5c !important;padding:10px 20px}
.check-btn:hover{background:#3daa3d !important}

/* Feedback */
.feedback{font-size:1.15rem;font-weight:700;margin:10px 0 4px;min-height:30px}
.feedback.correct{color:#228b22}
.feedback.wrong{color:#cc2200}

/* Keyframe animations */
@keyframes shake {
  0%,100%{transform:translateX(0)}
  15%{transform:translateX(-10px)}
  30%{transform:translateX(10px)}
  45%{transform:translateX(-7px)}
  60%{transform:translateX(7px)}
  75%{transform:translateX(-4px)}
  90%{transform:translateX(4px)}
}
@keyframes correctGlow {
  0%  {box-shadow:0 8px 24px rgba(34,50,77,.1)}
  40% {box-shadow:0 0 0 14px rgba(80,220,80,.35),0 8px 24px rgba(34,50,77,.1)}
  100%{box-shadow:0 8px 24px rgba(34,50,77,.1)}
}
@keyframes wrongGlow {
  0%  {box-shadow:0 8px 24px rgba(34,50,77,.1)}
  30% {box-shadow:0 0 0 14px rgba(220,50,50,.35),0 8px 24px rgba(34,50,77,.1)}
  100%{box-shadow:0 8px 24px rgba(34,50,77,.1)}
}
@keyframes popIn {
  0%  {transform:scale(0.6);opacity:0}
  65% {transform:scale(1.2)}
  100%{transform:scale(1);opacity:1}
}
@keyframes floatUp {
  0%  {transform:translateY(0) rotate(0deg) scale(1);opacity:1}
  100%{transform:translateY(-130px) rotate(360deg) scale(0.5);opacity:0}
}

.anim-correct{animation:correctGlow .8s ease}
.anim-wrong  {animation:shake .5s ease, wrongGlow .6s ease}
.anim-pop    {animation:popIn .4s ease}

.confetti-piece{position:absolute;font-size:24px;pointer-events:none;animation:floatUp 1.1s ease-out forwards}

footer{background:linear-gradient(90deg,var(--grass),#bcf7bc);border-top:4px solid #70c970;text-align:center;padding:14px;font-weight:600}

@media print {
  body * { visibility:hidden }
  .print-area, .print-area * { visibility:visible }
  .print-area { position:absolute; top:0; left:0; width:100% }
  button, nav, header, footer, select, .answer-area, .feedback { display:none }
}
</style>
</head>
<body>

<header>
  <h1 class="logo"><a href="main.html">Baby Genius</a></h1>
  <nav aria-label="Main Navigation">
    <ul>
      <li><a href="Chess.html">Chess</a></li>
      <li><a href="Math.html">Math</a></li>
      <li><a href="Setting.html">Setting</a></li>
    </ul>
  </nav>
</header>

<main>
  <div class="container" id="mainContainer">
    <h2 style="color:var(--berry)">Visual Math Puzzle</h2>

    <label>Difficulty:</label><br>
    <select id="difficulty">
      <option value="easy">Easy</option>
      <option value="medium">Medium</option>
      <option value="hard">Hard</option>
    </select>

    <div class="print-area" id="puzzle-content">Click Generate!</div>

    <div class="answer-area" id="answer-area">
      <input type="number" id="user-answer" placeholder="?" min="0">
      <button class="check-btn" onclick="checkAnswer()">Check ✔</button>
    </div>
    <div class="feedback" id="feedback"></div>

    <button onclick="generatePuzzle()">Generate Puzzle</button>
    <button onclick="printPuzzle()">🖨️ Print</button>
  </div>
</main>

<footer>
  Baby Genius - Learning is an adventure!
</footer>

<script>
let correctAnswer = null;

// ── Puzzle bank ────────────────────────────────────────────────────
const PUZZLES = {

  easy: [
    // Counting (1-5)
    () => {
      const icons = ['🍎','🌟','🐶','🦋','🌈','🐸','🍭'];
      const icon  = pick(icons), count = rand(1, 5);
      return {
        html: `<div class="emoji-group">${icon.repeat(count)}</div>`,
        label: `How many ${icon} are there?`,
        answer: count
      };
    },
    // Visual addition (groups of emojis)
    () => {
      const a = rand(1, 4), b = rand(1, 4);
      const pairs = [['🍎','🍊'],['🌟','⭐'],['🐱','🐶'],['🌸','🌺'],['🍬','🍭']];
      const [iA, iB] = pick(pairs);
      return {
        html: `<div class="emoji-group">${iA.repeat(a)}</div>
               <div style="font-size:1.8rem">➕</div>
               <div class="emoji-group">${iB.repeat(b)}</div>
               <p class="equation">${a} + ${b} = ?</p>`,
        label: `Count all the items!`,
        answer: a + b
      };
    },
    // Simple subtraction
    () => {
      const a = rand(3, 9), b = rand(1, a - 1);
      const icon = pick(['🍎','🌟','🐟','🎈']);
      return {
        html: `<div class="emoji-group">${icon.repeat(a)}</div>
               <p class="equation">${a} − ${b} = ?</p>`,
        label: `Take away ${b} ${icon}`,
        answer: a - b
      };
    },
    // Which number is bigger (fill the bigger one)
    () => {
      const a = rand(1, 9), b = rand(1, 9);
      const bigger = Math.max(a, b);
      return {
        html: `<p class="equation">${a} &nbsp;or&nbsp; ${b}</p>
               <p style="font-size:1rem;margin:4px 0">Which number is <strong>bigger</strong>?</p>`,
        label: `Type the bigger number`,
        answer: bigger
      };
    }
  ],

  medium: [
    // Counting (5-12)
    () => {
      const icons = ['🍌','🍇','🍓','🍒','🥝','🌻','🐠'];
      const icon  = pick(icons), count = rand(5, 12);
      return {
        html: `<div class="emoji-group">${icon.repeat(count)}</div>`,
        label: `How many ${icon} are there?`,
        answer: count
      };
    },
    // Two-digit addition
    () => {
      const a = rand(10, 25), b = rand(5, 20);
      return {
        html: `<p class="equation">${a} + ${b} = ?</p>`,
        label: `Add the two numbers`,
        answer: a + b
      };
    },
    // Two-digit subtraction
    () => {
      const b = rand(5, 15), a = b + rand(5, 20);
      return {
        html: `<p class="equation">${a} − ${b} = ?</p>`,
        label: `Subtract the numbers`,
        answer: a - b
      };
    },
    // Multiplication ×2 / ×3 / ×4
    () => {
      const mult = rand(2, 4), by = rand(2, 9);
      const icon = pick(['🌟','🍎','🐟','🎈']);
      return {
        html: `<p class="equation">${mult} × ${by} = ?</p>
               <p style="font-size:0.95rem;color:#888">${mult} groups of ${by} ${icon}</p>`,
        label: `Multiply!`,
        answer: mult * by
      };
    },
    // Missing number in addition  ( ? + b = c )
    () => {
      const missing = rand(2, 10), b = rand(2, 10), c = missing + b;
      return {
        html: `<p class="equation">? + ${b} = ${c}</p>`,
        label: `What is the missing number?`,
        answer: missing
      };
    }
  ],

  hard: [
    // Counting (12-20)
    () => {
      const icons = ['🔵','🟣','🟡','🟠','🔴','⬛','🟤'];
      const icon  = pick(icons), count = rand(12, 20);
      return {
        html: `<div class="emoji-group">${icon.repeat(count)}</div>`,
        label: `How many ${icon} are there?`,
        answer: count
      };
    },
    // Large addition
    () => {
      const a = rand(25, 75), b = rand(15, 50);
      return {
        html: `<p class="equation">${a} + ${b} = ?</p>`,
        label: `Add the two numbers`,
        answer: a + b
      };
    },
    // Large subtraction
    () => {
      const b = rand(15, 40), a = b + rand(10, 50);
      return {
        html: `<p class="equation">${a} − ${b} = ?</p>`,
        label: `Subtract the numbers`,
        answer: a - b
      };
    },
    // Multiplication up to 10×10
    () => {
      const a = rand(3, 10), b = rand(3, 10);
      return {
        html: `<p class="equation">${a} × ${b} = ?</p>`,
        label: `Multiply!`,
        answer: a * b
      };
    },
    // Division (always whole number result)
    () => {
      const divisor = rand(2, 9), result = rand(2, 9);
      const dividend = divisor * result;
      return {
        html: `<p class="equation">${dividend} ÷ ${divisor} = ?</p>`,
        label: `Divide evenly`,
        answer: result
      };
    },
    // Missing number in equation  ( a × ? = c )
    () => {
      const missing = rand(2, 9), a = rand(2, 9);
      return {
        html: `<p class="equation">${a} × ? = ${a * missing}</p>`,
        label: `Find the missing number`,
        answer: missing
      };
    }
  ]
};

// ── Core functions ─────────────────────────────────────────────────
function generatePuzzle() {
  const difficulty = document.getElementById('difficulty').value;
  const pool   = PUZZLES[difficulty];
  const puzzle = pick(pool)();

  correctAnswer = puzzle.answer;

  const container = document.getElementById('puzzle-content');
  container.innerHTML = puzzle.html +
    `<p class="puzzle-label">${puzzle.label}</p>`;

  const answerArea = document.getElementById('answer-area');
  answerArea.style.display = 'flex';

  const feedback = document.getElementById('feedback');
  feedback.textContent = '';
  feedback.className   = 'feedback';

  const input = document.getElementById('user-answer');
  input.value = '';
  input.focus();

  // Reset container animation
  const box = document.getElementById('mainContainer');
  box.classList.remove('anim-correct', 'anim-wrong');
}

function checkAnswer() {
  const input    = document.getElementById('user-answer');
  const feedback = document.getElementById('feedback');
  const val = parseInt(input.value, 10);

  if (isNaN(val)) {
    feedback.textContent = 'Please enter a number!';
    feedback.className   = 'feedback wrong';
    return;
  }

  if (val === correctAnswer) {
    feedback.textContent = '🎉 Correct! Amazing job!';
    feedback.className   = 'feedback correct';
    triggerCorrect();
  } else {
    feedback.textContent = `❌ Not quite — try again!`;
    feedback.className   = 'feedback wrong';
    triggerWrong();
  }
}

// ── Animations ─────────────────────────────────────────────────────
function triggerCorrect() {
  const box = document.getElementById('mainContainer');
  resetAnim(box);
  box.classList.add('anim-correct');

  const celebEmojis = ['🎉','⭐','🌟','🎈','✨','🏆','🎊','💫'];
  for (let i = 0; i < 14; i++) {
    const el = document.createElement('div');
    el.className   = 'confetti-piece';
    el.textContent = pick(celebEmojis);
    el.style.left           = rand(5, 92) + '%';
    el.style.bottom         = rand(5, 20) + '%';
    el.style.animationDelay = (i * 70) + 'ms';
    box.appendChild(el);
    setTimeout(() => el.remove(), 1500);
  }
}

function triggerWrong() {
  const box = document.getElementById('mainContainer');
  resetAnim(box);
  box.classList.add('anim-wrong');
}

function resetAnim(el) {
  el.classList.remove('anim-correct', 'anim-wrong');
  void el.offsetWidth; // force reflow so animation restarts
}

// ── Helpers ────────────────────────────────────────────────────────
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function pick(arr)      { return arr[rand(0, arr.length - 1)]; }

function printPuzzle() { window.print(); }

// Enter key submits answer
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('answer-area').style.display === 'flex') {
    checkAnswer();
  }
});
</script>
</body>
</html>
